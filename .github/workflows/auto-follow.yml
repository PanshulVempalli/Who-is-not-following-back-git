name: Auto Follow and Unfollow

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-follow-unfollow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run follow script
        env:
          GITHUB_TOKEN: ${{ secrets.FOLLOW_TOKEN }}
        run: python auto_follow.py

      - name: Commit follow log
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "update follow log"
          git push
